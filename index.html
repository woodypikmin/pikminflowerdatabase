<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikmin Bloom 盆栽收成記錄器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script>
        Babel.registerPreset('react-classic', {
            presets: [
                [Babel.availablePresets.react, { "runtime": "classic" }]
            ]
        });
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react-classic">
        const { useState, useEffect, useMemo, useCallback } = React;

        const ADMIN_PASSWORD = "admin";

        // ★★★ 請把你的網頁應用程式網址貼在這裡 ★★★
        const GOOGLE_SHEETS_API_URL = "https://script.google.com/macros/s/AKfycbwgDoLcjCPHOA3hxj2CEZdXYO2K3lWSZASHg7Z0Yy5N83_82HoNf8MPp9kA6wtiBkwq/exec";

        const PIKMIN_CATEGORIES = {
            "餐廳": ["廚師帽子"], "咖啡廳": ["咖啡杯"], "甜點店": ["馬卡龍", "甜甜圈"], "電影院": ["爆米花"],
            "藥局": ["牙刷"], "動物園": ["蒲公英"], "森林": ["鍬形蟲", "橡栗"], "水邊": ["擬餌"],
            "郵局": ["郵票"], "美術館": ["畫框"], "機場": ["飛機玩具"], "車站": ["電車紙模型", "票券"],
            "海灘": ["貝殼"], "漢堡店": ["漢堡"], "便利商店": ["瓶蓋", "零食"], "超市": ["蘑菇", "香蕉"],
            "麵包店": ["法國麵包"], "美容院": ["剪刀"], "服飾店": ["髮圈"], "公園": ["幸運草", "四葉幸運草"],
            "圖書館": ["迷你書"], "路邊": ["路邊"], "壽司餐廳": ["壽司"],
            "山丘": ["山丘別針徽章"], "體育館": ["體育館鑰匙圈"], "五金行": ["工具"], "公車站": ["公車紙模型"],
            "化妝品商店": ["化妝品"], "義式餐廳": ["披薩", "義大利麵"], "咖哩餐廳": ["一碗咖哩"],
            "飯店": ["飯店備品"], "主題樂園": ["主題樂園門票"], "墨西哥餐廳": ["塔可餅"], "橋樑": ["橋樑別針"],
            "神社和寺廟": ["大吉", "吉", "末吉"], "洗衣店": ["洗衣用品"], "拉麵店": ["拉麵鑰匙圈"],
            "學校": ["校徽胸針"], "電器行": ["電池", "仙女燈"], "韓國餐廳": ["韓國泡菜"], "起司店": ["起司"],
            "其他": ["其他"]
        };

        const COLORS = [
            { id: '紅', bg: 'bg-red-500', text: 'text-white' }, { id: '黃', bg: 'bg-yellow-400', text: 'text-yellow-900' },
            { id: '藍', bg: 'bg-blue-500', text: 'text-white' }, { id: '紫', bg: 'bg-purple-600', text: 'text-white' },
            { id: '白', bg: 'bg-white', text: 'text-gray-800', border: 'border border-gray-300' }, { id: '粉', bg: 'bg-pink-400', text: 'text-white' },
            { id: '岩', bg: 'bg-gray-600', text: 'text-white' }, { id: '冰', bg: 'bg-cyan-300', text: 'text-cyan-900' }
        ];

        const getEmptyColors = () => ({ '紅': 0, '黃': 0, '藍': 0, '紫': 0, '白': 0, '粉': 0, '岩': 0, '冰': 0 });

        const formatDateOnly = (dateString) => {
            if (!dateString) return "無紀錄";
            try {
                const d = new Date(dateString);
                if (isNaN(d.getTime())) return dateString; 
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            } catch (e) {
                return dateString;
            }
        };

        const ColorCounter = ({ color, count, onChange, disabled }) => (
            <div className={`flex flex-col items-center justify-between p-1.5 rounded-lg ${color.bg} ${color.text} ${color.border || ''} shadow-sm min-w-[3.5rem]`}>
                <span className="text-[11px] font-black mb-1">{color.id}</span>
                <div className="flex items-center gap-1 bg-black/10 rounded px-1 py-0.5 w-full justify-between">
                    <button type="button" disabled={disabled} onClick={() => onChange(Math.max(0, count - 1))} className="w-4 h-4 flex items-center justify-center rounded hover:bg-black/20 font-mono text-xs disabled:opacity-30">-</button>
                    <span className="text-xs font-black text-center">{count}</span>
                    <button type="button" disabled={disabled} onClick={() => onChange(count + 1)} className="w-4 h-4 flex items-center justify-center rounded hover:bg-black/20 font-mono text-xs disabled:opacity-30">+</button>
                </div>
            </div>
        );

        const TargetLocalClock = ({ lat, lng }) => {
            const [timeStr, setTimeStr] = useState("");
            useEffect(() => {
                let isMounted = true;
                const fetchTime = async () => {
                    try {
                        const res = await fetch(`https://timeapi.io/api/TimeZone/coordinate?latitude=${lat}&longitude=${lng}`);
                        if (res.ok) {
                            const data = await res.json();
                            if (isMounted && data.currentLocalTime) setTimeStr(data.currentLocalTime.split('T')[1].slice(0, 5));
                        }
                    } catch (e) {}
                };
                fetchTime();
                const id = setInterval(fetchTime, 30000);
                return () => { isMounted = false; clearInterval(id); };
            }, [lat, lng]);
            return timeStr ? <span className="text-xs bg-slate-700 text-emerald-300 px-2 py-0.5 rounded font-mono ml-2">當地現在: {timeStr}</span> : null;
        };

        const parseLocationData = (dataArray) => {
            return dataArray.map(loc => {
                let cat = loc.targetCategory || "餐廳";
                let sub = loc.targetSubCategory || "全部";
                
                if (cat.includes(" (") && cat.endsWith(")")) {
                    sub = cat.substring(cat.indexOf(" (") + 2, cat.length - 1);
                    cat = cat.substring(0, cat.indexOf(" ("));
                }
                return { ...loc, targetCategory: cat, targetSubCategory: sub };
            });
        };

        const App = () => {
            const [locations, setLocations] = useState([]);
            const [isInitialLoading, setIsInitialLoading] = useState(true);
            const [isAdmin, setIsAdmin] = useState(false);
            
            const [lat, setLat] = useState("");
            const [lng, setLng] = useState("");
            const [region, setRegion] = useState("");
            const [customName, setCustomName] = useState("");
            const [visitDate, setVisitDate] = useState(new Date().toISOString().slice(0, 10));
            const [isDetecting, setIsDetecting] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [editingVisitId, setEditingVisitId] = useState(null);
            
            const [expandedLocs, setExpandedLocs] = useState(new Set());
            const [records, setRecords] = useState([
                { id: Date.now(), category: "餐廳", subCategory: "廚師帽子", colors: getEmptyColors() }
            ]);

            useEffect(() => {
                localforage.config({ name: 'PikminHarvestTracker' });
                if (sessionStorage.getItem('pikmin-admin-auth') === 'true') setIsAdmin(true);

                if (GOOGLE_SHEETS_API_URL.startsWith("http")) {
                    fetch(GOOGLE_SHEETS_API_URL)
                        .then(res => res.json())
                        .then(data => {
                            const parsedData = parseLocationData(data);
                            setLocations(parsedData);
                            localforage.setItem('pikmin-seedlings', parsedData);
                            setIsInitialLoading(false);
                        })
                        .catch(err => {
                            console.error("雲端讀取失敗，讀取本地備用庫");
                            localforage.getItem('pikmin-seedlings').then(saved => {
                                if (saved) setLocations(parseLocationData(saved));
                                setIsInitialLoading(false);
                            });
                        });
                } else {
                    localforage.getItem('pikmin-seedlings').then(saved => {
                        if (saved) setLocations(parseLocationData(saved));
                        setIsInitialLoading(false);
                    });
                }
            }, []);

            const syncToCloud = async (dataToSync) => {
                if (!GOOGLE_SHEETS_API_URL.startsWith("http")) return;
                try {
                    const payloadData = dataToSync.map(loc => {
                        let combined = loc.targetCategory || "餐廳";
                        if (loc.targetSubCategory && loc.targetSubCategory !== "全部") {
                            combined += ` (${loc.targetSubCategory})`;
                        }
                        return { ...loc, targetCategory: combined };
                    });

                    await fetch(GOOGLE_SHEETS_API_URL, {
                        method: "POST",
                        body: JSON.stringify({ action: "sync_all", data: payloadData })
                    });
                } catch (e) { console.error("雲端寫入失敗", e); }
            };

            const handleAdminToggle = () => {
                if (isAdmin) {
                    if (confirm("確定要登出管理員模式（鎖定網頁）嗎？")) {
                        setIsAdmin(false);
                        sessionStorage.removeItem('pikmin-admin-auth');
                        setEditingVisitId(null);
                    }
                } else {
                    const pwd = prompt("請輸入管理員密碼解鎖編輯功能：");
                    if (pwd === ADMIN_PASSWORD) {
                        setIsAdmin(true);
                        sessionStorage.setItem('pikmin-admin-auth', 'true');
                        alert("🔓 解鎖成功！管理員模式已開啟。");
                    } else if (pwd !== null) {
                        alert("❌ 密碼錯誤！無法開啟編輯功能。");
                    }
                }
            };

            const handleCoordinatePaste = (e) => {
                if (!isAdmin) return;
                const text = e.clipboardData.getData('text').trim();
                const coordsRegex = /^[\(\[]?\s*(-?\d+(\.\d+)?)\s*[,;]\s*(-?\d+(\.\d+)?)\s*[\)\]]?$/;
                const match = text.match(coordsRegex);
                if (match) {
                    e.preventDefault(); 
                    setLat(match[1]);
                    setLng(match[3]);
                }
            };

            const handleDetectLocation = async () => {
                if (!lat || !lng) return alert("請先填寫緯度與經度！");
                setIsDetecting(true);
                try {
                    const baseRes = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}`);
                    const baseData = await baseRes.json();
                    const lang = ['TW', 'JP', 'KR'].includes(baseData.countryCode) ? 'zh-tw' : 'en';
                    
                    const resGeo = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=${lang}`);
                    const dataGeo = await resGeo.json();
                    
                    let cName = dataGeo.countryName || "";
                    if (cName === "中華民國" || cName === "Republic of China") cName = "台灣";
                    let textParts = [];
                    if (baseData.countryCode === 'TW') {
                        if (dataGeo.principalSubdivision) textParts.push(dataGeo.principalSubdivision);
                        if (dataGeo.locality || dataGeo.city) textParts.push(dataGeo.locality || dataGeo.city);
                    } else {
                        if (cName) textParts.push(cName);
                        if (dataGeo.principalSubdivision && dataGeo.principalSubdivision !== cName) textParts.push(dataGeo.principalSubdivision);
                    }
                    setRegion([...new Set(textParts)].join(" ") || "未知地點");
                } catch (error) {
                    alert("解析地點失敗，請確認網路與座標格式。");
                } finally {
                    setIsDetecting(false);
                }
            };

            const handleAddRecordBlock = () => {
                setRecords([...records, { id: Date.now(), category: "餐廳", subCategory: "廚師帽子", colors: getEmptyColors() }]);
            };

            const handleRemoveRecordBlock = (id) => {
                if (records.length === 1) return alert("至少需要保留一個類別喔！");
                setRecords(records.filter(r => r.id !== id));
            };

            const updateRecord = (id, field, value) => {
                setRecords(records.map(r => {
                    if (r.id === id) {
                        if (field === 'category') {
                            const sub = value === "路邊" ? "路邊" : PIKMIN_CATEGORIES[value][0];
                            return { ...r, category: value, subCategory: sub };
                        }
                        if (field.startsWith('color_')) {
                            const colorName = field.split('_')[1];
                            return { ...r, colors: { ...r.colors, [colorName]: value } };
                        }
                        return { ...r, [field]: value };
                    }
                    return r;
                }));
            };

            const handleSave = async () => {
                if (!isAdmin) return;
                if (!lat || !lng || !visitDate) return alert("座標與日期為必填項目！");
                const hasColors = records.some(r => Object.values(r.colors || {}).some(count => count > 0));
                if (!hasColors) return alert("請至少填寫一個盆栽的顏色數量！");

                setIsSaving(true);
                const locKey = `${parseFloat(lat).toFixed(5)},${parseFloat(lng).toFixed(5)}`;
                let existingLocs = [...locations];
                let locIndex = existingLocs.findIndex(l => l.key === locKey);
                
                const newVisit = {
                    id: editingVisitId || Date.now().toString(),
                    date: visitDate, 
                    records: records.map(r => ({ ...r }))
                };

                if (locIndex >= 0) {
                    if (editingVisitId) {
                        existingLocs[locIndex].visits = existingLocs[locIndex].visits.map(v => v.id === editingVisitId ? newVisit : v);
                    } else {
                        existingLocs[locIndex].visits.push(newVisit);
                    }
                    existingLocs[locIndex].visits.sort((a,b) => b.date.localeCompare(a.date));
                    existingLocs[locIndex].region = region || existingLocs[locIndex].region;
                    existingLocs[locIndex].customName = customName.trim() || existingLocs[locIndex].customName || "";
                } else {
                    existingLocs.push({
                        key: locKey, lat, lng, region, customName: customName.trim(), targetCategory: "餐廳", targetSubCategory: "全部", visits: [newVisit]
                    });
                }
                
                setLocations(existingLocs);
                await localforage.setItem('pikmin-seedlings', existingLocs);
                await syncToCloud(existingLocs);
                
                const nextExpanded = new Set(expandedLocs);
                nextExpanded.add(locKey);
                setExpandedLocs(nextExpanded);

                setRecords([{ id: Date.now(), category: "餐廳", subCategory: "廚師帽子", colors: getEmptyColors() }]);
                setEditingVisitId(null);
                setLat(""); setLng(""); setRegion(""); setCustomName("");
                
                setIsSaving(false);
                
                const toast = document.createElement('div');
                toast.className = "fixed bottom-5 right-5 bg-slate-800 text-white px-4 py-2 rounded-lg shadow-lg z-50 text-sm font-bold transition-opacity duration-300";
                toast.innerText = "💾 已儲存並同步至雲端！";
                document.body.appendChild(toast);
                setTimeout(() => { toast.style.opacity = '0'; setTimeout(()=> toast.remove(), 300); }, 2000);
            };

            const handleEditVisit = (loc, visit) => {
                if (!isAdmin) return;
                setLat(loc.lat);
                setLng(loc.lng);
                setRegion(loc.region);
                setCustomName(loc.customName || "");
                setVisitDate(formatDateOnly(visit.date));
                setEditingVisitId(visit.id);
                setRecords(visit.records.map(r => ({ ...r, id: r.id || Date.now() + Math.random() })));
                window.scrollTo({ top: 0, behavior: 'smooth' }); 
            };

            const handleUpdateTargetCategory = async (key, value) => {
                if (!isAdmin) return;
                const nextLocs = locations.map(l => {
                    if (l.key === key) return { ...l, targetCategory: value, targetSubCategory: "全部" };
                    return l;
                });
                setLocations(nextLocs);
                await localforage.setItem('pikmin-seedlings', nextLocs);
                await syncToCloud(nextLocs);
            };

            const handleUpdateTargetSubCategory = async (key, value) => {
                if (!isAdmin) return;
                const nextLocs = locations.map(l => {
                    if (l.key === key) return { ...l, targetSubCategory: value };
                    return l;
                });
                setLocations(nextLocs);
                await localforage.setItem('pikmin-seedlings', nextLocs);
                await syncToCloud(nextLocs);
            };

            const handleDeleteLocation = async (key) => {
                if (!isAdmin) return;
                if (!confirm("確定要刪除這個地點的所有紀錄嗎？")) return;
                const newLocs = locations.filter(l => l.key !== key);
                setLocations(newLocs);
                await localforage.setItem('pikmin-seedlings', newLocs);
                await syncToCloud(newLocs);
            };

            const handleDeleteVisit = async (locKey, visitId) => {
                if (!isAdmin) return;
                if (!confirm("確定要刪除該時間點的紀錄嗎？")) return;
                let newLocs = locations.map(l => {
                    if (l.key === locKey) {
                        return { ...l, visits: l.visits.filter(v => v.id !== visitId) };
                    }
                    return l;
                }).filter(l => l.visits.length > 0); 
                setLocations(newLocs);
                await localforage.setItem('pikmin-seedlings', newLocs);
                await syncToCloud(newLocs);
            };

            const toggleExpand = (key) => {
                const next = new Set(expandedLocs);
                if (next.has(key)) next.delete(key);
                else next.add(key);
                setExpandedLocs(next);
            };
            
            const handleCopyCoords = (e, lat, lng) => {
                e.stopPropagation(); 
                const coordsText = `${lat}, ${lng}`;
                navigator.clipboard.writeText(coordsText).then(() => {
                    const btn = e.currentTarget;
                    const originalHTML = btn.innerHTML;
                    btn.innerHTML = '<i class="fas fa-check text-emerald-500"></i>';
                    setTimeout(() => { btn.innerHTML = originalHTML; }, 1000);
                });
            };

            if (isInitialLoading) {
                return <div className="min-h-screen flex items-center justify-center text-emerald-600 font-bold bg-slate-50"><i className="fas fa-spinner fa-spin mr-2"></i> 正在連線讀取歷史資料...</div>;
            }

            return (
                <div>
                    <header className="bg-emerald-600 text-white shadow-lg sticky top-0 z-30">
                        <div className="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
                            <h1 className="text-xl font-bold flex items-center gap-2">
                                <i className="fas fa-seedling text-emerald-200"></i> Pikmin Bloom 盆栽收成記錄器
                            </h1>
                            <div className="flex items-center gap-3">
                                <div className="text-xs opacity-80 bg-black/20 px-3 py-1 rounded-full hidden sm:block">
                                    已儲存 {locations.length} 個地點
                                </div>
                                <button 
                                    onClick={handleAdminToggle} 
                                    className={`px-3 py-1.5 rounded-lg font-bold text-xs shadow-md transition-all flex items-center gap-1.5 ${isAdmin ? 'bg-yellow-400 text-slate-900 hover:bg-yellow-500' : 'bg-emerald-700 text-emerald-100 hover:bg-emerald-800'}`}
                                >
                                    <i className={`fas ${isAdmin ? 'fa-lock-open' : 'fa-lock'}`}></i>
                                    {isAdmin ? '管理員模式' : '訪客模式(唯讀)'}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-6 grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                        
                        {/* 左側表單：僅在管理員登入下顯示 */}
                        {isAdmin ? (
                            <div className="lg:col-span-5 space-y-6 sticky top-24 z-10">
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                                    <h2 className="text-lg font-black text-slate-800 mb-4 border-b pb-2 flex items-center gap-2">
                                        <i className="fas fa-edit text-emerald-500"></i> {editingVisitId ? "修改收成紀錄" : "新增收成紀錄"}
                                    </h2>
                                    
                                    <div className="space-y-3 mb-6 bg-slate-50 p-4 rounded-xl border border-slate-100">
                                        <div className="flex justify-between items-center">
                                            <h3 className="text-sm font-bold text-slate-700"><i className="fas fa-map-marker-alt text-emerald-500 mr-1"></i> 1. 地點座標</h3>
                                            <button onClick={handleDetectLocation} disabled={isDetecting} className="bg-emerald-500 hover:bg-emerald-600 text-white text-xs px-3 py-1.5 rounded-lg shadow-sm font-bold transition-colors disabled:opacity-50">
                                                {isDetecting ? '解析中...' : '解析地點'}
                                            </button>
                                        </div>
                                        <div className="flex gap-2">
                                            <input type="text" placeholder="緯度 (Lat)" onPaste={handleCoordinatePaste} value={lat} onChange={e => setLat(e.target.value)} className="w-1/2 border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 outline-none" />
                                            <input type="text" placeholder="經度 (Lng)" onPaste={handleCoordinatePaste} value={lng} onChange={e => setLng(e.target.value)} className="w-1/2 border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 outline-none" />
                                        </div>
                                        {region && <div className="text-xs font-bold text-emerald-700 bg-emerald-100 px-2 py-1 rounded inline-block">辨識地區：{region}</div>}
                                        <div className="pt-2 border-t border-slate-200">
                                            <label className="block text-xs font-bold text-slate-600 mb-1">自訂地點名稱（可留空）</label>
                                            <input type="text" placeholder="例如：家附近公園、公司旁咖啡廳" value={customName} onChange={e => setCustomName(e.target.value)} className="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 outline-none" />
                                            <p className="text-[10px] text-slate-400 mt-1">儲存後會優先顯示此名稱。</p>
                                        </div>
                                    </div>

                                    <div className="space-y-2 mb-6">
                                        <h3 className="text-sm font-bold text-slate-700"><i className="far fa-calendar-alt text-emerald-500 mr-1"></i> 2. 刷盆日期</h3>
                                        <input type="date" value={visitDate} onChange={e => setVisitDate(e.target.value)} className="w-full border border-slate-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 outline-none" />
                                    </div>

                                    <div className="space-y-4 mb-6">
                                        <h3 className="text-sm font-bold text-slate-700"><i className="fas fa-box-open text-emerald-500 mr-1"></i> 3. 獲得盆栽數量</h3>
                                        
                                        {records.map((rec, index) => (
                                            <div key={rec.id} className="bg-white border-2 border-slate-100 rounded-xl p-4 shadow-sm relative group hover:border-emerald-100 transition-colors">
                                                {records.length > 1 && (
                                                    <button onClick={() => handleRemoveRecordBlock(rec.id)} className="absolute -top-3 -right-3 bg-white border border-red-200 text-red-500 hover:bg-red-500 hover:text-white w-7 h-7 rounded-full flex items-center justify-center text-xs shadow-sm z-10">
                                                        <i className="fas fa-times"></i>
                                                    </button>
                                                )}
                                                
                                                <div className="flex gap-2 mb-3">
                                                    <select value={rec.category} onChange={e => updateRecord(rec.id, 'category', e.target.value)} className="flex-1 border border-slate-300 rounded-lg p-2 text-sm outline-none bg-slate-50 focus:bg-white focus:ring-2 focus:ring-emerald-500">
                                                        {Object.keys(PIKMIN_CATEGORIES).map(c => <option key={c} value={c}>{c}</option>)}
                                                    </select>
                                                    {rec.category !== "路邊" && (
                                                        <select value={rec.subCategory} onChange={e => updateRecord(rec.id, 'subCategory', e.target.value)} className="flex-1 border border-slate-300 rounded-lg p-2 text-sm outline-none bg-slate-50 focus:bg-white focus:ring-2 focus:ring-emerald-500">
                                                            {PIKMIN_CATEGORIES[rec.category].map(sc => <option key={sc} value={sc}>{sc}</option>)}
                                                        </select>
                                                    )}
                                                </div>

                                                <div className="grid grid-cols-4 gap-2">
                                                    {COLORS.map(color => (
                                                        <ColorCounter 
                                                            key={color.id} 
                                                            color={color} 
                                                            count={(rec.colors && rec.colors[color.id]) || 0} 
                                                            onChange={(val) => updateRecord(rec.id, `color_${color.id}`, val)} 
                                                            disabled={!isAdmin}
                                                        />
                                                    ))}
                                                </div>
                                            </div>
                                        ))}

                                        <button onClick={handleAddRecordBlock} className="w-full py-2.5 border-2 border-dashed border-emerald-200 text-emerald-600 hover:bg-emerald-50 rounded-xl font-bold text-sm flex items-center justify-center gap-2">
                                            <i className="fas fa-plus"></i> 加入另一個盆栽類別
                                        </button>
                                    </div>

                                    <div className="flex gap-2">
                                        {editingVisitId && (
                                            <button onClick={() => { setEditingVisitId(null); setRecords([{ id: Date.now(), category: "餐廳", subCategory: "廚師帽子", colors: getEmptyColors() }]); setLat(""); setLng(""); setRegion(""); setCustomName(""); }} className="flex-1 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-xl text-sm">取消修改</button>
                                        )}
                                        <button onClick={handleSave} disabled={isSaving} className="flex-[2] bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all active:scale-95 text-lg flex items-center justify-center gap-2 disabled:opacity-50">
                                            {isSaving ? <i className="fas fa-spinner fa-spin"></i> : <i className="fas fa-save"></i>} 同步儲存
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="lg:col-span-4 bg-white p-5 rounded-2xl border border-slate-200 text-center text-slate-500 space-y-2 sticky top-24">
                                <div className="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center mx-auto text-slate-400"><i className="fas fa-eye"></i></div>
                                <h3 className="font-bold text-slate-700">唯讀瀏覽模式</h3>
                                <p className="text-xs leading-relaxed text-slate-400">目前網頁已鎖定，訪客僅能查看圖鑑與複製座標。若要進行編輯或同步資料，請點選右上角解鎖。</p>
                            </div>
                        )}

                        {/* 右側展示區 */}
                        <div className={`${isAdmin ? 'lg:col-span-7' : 'lg:col-span-8'} space-y-4`}>
                            {locations.length === 0 ? (
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-10 text-center text-slate-400 mt-10 lg:mt-0">
                                    <i className="fas fa-map-marked-alt text-4xl mb-3 opacity-30"></i>
                                    <p className="font-bold">目前資料庫空空如也...</p>
                                </div>
                            ) : (
                                locations.sort((a,b) => b.visits[0].date.localeCompare(a.visits[0].date)).map(loc => {
                                    const isExpanded = expandedLocs.has(loc.key);
                                    let totalSeedlings = 0;
                                    let totalTargetCategoryCount = 0; 
                                    
                                    const currentTarget = loc.targetCategory || "餐廳";
                                    const currentSubTarget = loc.targetSubCategory || "全部";
                                    
                                    const hasSubCategories = PIKMIN_CATEGORIES[currentTarget] && PIKMIN_CATEGORIES[currentTarget].length > 1;

                                    const summaryObj = {};
                                    loc.visits.forEach(v => {
                                        (v.records || []).forEach(r => {
                                            const activeColors = Object.entries(r.colors || {}).filter(([_, count]) => count > 0);
                                            if (activeColors.length > 0) {
                                                const catName = r.category !== "路邊" && r.subCategory !== "其他" ? r.subCategory : r.category;
                                                if (!summaryObj[catName]) summaryObj[catName] = {};
                                                
                                                activeColors.forEach(([color, count]) => {
                                                    summaryObj[catName][color] = (summaryObj[catName][color] || 0) + count;
                                                    totalSeedlings += count;
                                                    
                                                    if(r.category === currentTarget) {
                                                        if(currentSubTarget === "全部" || r.subCategory === currentSubTarget) {
                                                            totalTargetCategoryCount += count;
                                                        }
                                                    }
                                                });
                                            }
                                        });
                                    });

                                    const displayName = loc.customName && loc.customName.trim() ? loc.customName.trim() : (loc.region || "未知地點");
                                    const hasCustomName = loc.customName && loc.customName.trim();

                                    return (
                                        <div key={loc.key} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden transition-all hover:shadow-md">
                                            {/* 折疊式地點標頭 */}
                                            <div 
                                                className={`px-5 py-4 flex justify-between items-start cursor-pointer select-none transition-colors ${isExpanded ? 'bg-slate-800 text-white' : 'hover:bg-slate-50'}`}
                                                onClick={() => toggleExpand(loc.key)}
                                            >
                                                <div className="flex gap-3">
                                                    <i className={`fas fa-chevron-${isExpanded ? 'up' : 'down'} text-slate-400 text-xs mt-1.5`}></i>
                                                    <div>
                                                        <div className="flex items-center gap-2">
                                                            <h2 className={`text-lg font-bold flex items-center gap-2 ${isExpanded ? 'text-white' : 'text-slate-800'}`}>
                                                                <i className="fas fa-map-pin text-emerald-500"></i> {displayName}
                                                            </h2>
                                                            {hasCustomName && (
                                                                <span className={`text-xs font-bold px-2 py-0.5 rounded ${isExpanded ? 'bg-white/10 text-slate-200' : 'bg-slate-100 text-slate-500'}`}>
                                                                    {loc.region || "未知地點"}
                                                                </span>
                                                            )}
                                                            <TargetLocalClock lat={loc.lat} lng={loc.lng} />
                                                        </div>
                                                        <div className={`flex items-center text-xs font-mono mt-0.5 ${isExpanded ? 'text-slate-300 opacity-80' : 'text-slate-500'}`}>
                                                            {loc.lat}, {loc.lng}
                                                            <button 
                                                                onClick={(e) => handleCopyCoords(e, loc.lat, loc.lng)}
                                                                className={`ml-2 px-1.5 py-0.5 rounded transition-colors ${isExpanded ? 'hover:bg-slate-600 text-slate-400 hover:text-white' : 'hover:bg-slate-200 text-slate-400 hover:text-slate-700'}`}
                                                                title="複製座標"
                                                            >
                                                                <i className="far fa-copy"></i>
                                                            </button>
                                                        </div>
                                                        
                                                        {!isExpanded && Object.keys(summaryObj).length > 0 && (
                                                            <div className="mt-3 flex flex-wrap gap-2">
                                                                {Object.entries(summaryObj).map(([cat, colorsObj]) => (
                                                                    <div key={cat} className="flex items-center text-[11px] bg-slate-100 text-slate-600 rounded-full border border-slate-200 overflow-hidden shadow-sm">
                                                                        <span className="font-black bg-slate-200 px-2 py-0.5">{cat}</span>
                                                                        <span className="px-2 flex gap-1">
                                                                            {Object.entries(colorsObj).map(([c, count]) => {
                                                                                const colorDef = COLORS.find(col => col.id === c);
                                                                                return colorDef ? (
                                                                                    <span key={c} className={`flex items-center gap-0.5 font-bold ${colorDef.bg} ${colorDef.text} ${colorDef.border || ''} px-1 rounded-sm text-[9px]`}>
                                                                                        {c}{count}
                                                                                    </span>
                                                                                ) : null;
                                                                            })}
                                                                        </span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}

                                                        <div className="mt-2 flex flex-wrap items-center gap-1.5" onClick={e => e.stopPropagation()}>
                                                            <span className="text-[10px] bg-amber-500 text-white font-extrabold px-1.5 py-0.5 rounded shadow-sm">🎯 目標大類別</span>
                                                            <select 
                                                                disabled={!isAdmin}
                                                                value={currentTarget} 
                                                                onChange={e => handleUpdateTargetCategory(loc.key, e.target.value)}
                                                                className={`text-xs rounded px-1.5 py-0.5 border ${isExpanded ? 'bg-slate-700 border-slate-600 text-white' : 'bg-slate-100 border-slate-200 text-slate-700'} outline-none font-black disabled:opacity-90`}
                                                            >
                                                                {Object.keys(PIKMIN_CATEGORIES).map(c => <option key={c} value={c}>{c}</option>)}
                                                            </select>
                                                            
                                                            {hasSubCategories && (
                                                                <select 
                                                                    disabled={!isAdmin}
                                                                    value={currentSubTarget} 
                                                                    onChange={e => handleUpdateTargetSubCategory(loc.key, e.target.value)}
                                                                    className={`text-xs rounded px-1.5 py-0.5 border ${isExpanded ? 'bg-slate-700 border-slate-600 text-white' : 'bg-slate-100 border-slate-200 text-slate-700'} outline-none font-black disabled:opacity-90`}
                                                                >
                                                                    <option value="全部">全部</option>
                                                                    {PIKMIN_CATEGORIES[currentTarget].map(sc => <option key={sc} value={sc}>{sc}</option>)}
                                                                </select>
                                                            )}

                                                            <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${isExpanded ? 'text-amber-300' : 'text-amber-600'}`}>
                                                                (已獲取 {totalTargetCategoryCount} 盆)
                                                            </span>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex items-center gap-4">
                                                    <div className="flex flex-col items-end">
                                                        <span className="text-[10px] text-slate-400 font-bold">共 {loc.visits.length} 次拜訪</span>
                                                        <span className={`text-sm font-black ${isExpanded ? 'text-emerald-300' : 'text-emerald-600'}`}>{totalSeedlings} 盆</span>
                                                    </div>
                                                    {isExpanded && isAdmin && (
                                                        <button className="text-slate-400 hover:text-red-400 hover:bg-white/10 w-8 h-8 rounded-full flex items-center justify-center transition-colors" 
                                                            onClick={(e) => { e.stopPropagation(); handleDeleteLocation(loc.key); }} title="刪除此地點">
                                                            <i className="fas fa-trash-alt text-sm"></i>
                                                        </button>
                                                    )}
                                                </div>
                                            </div>

                                            {/* 內容展開區塊 */}
                                            {isExpanded && (
                                                <div className="p-5 space-y-5 bg-slate-50/50">
                                                    {loc.visits.map(visit => {
                                                        let visitTargetCount = 0;
                                                        (visit.records || []).forEach(rec => {
                                                            if (rec.category === currentTarget) {
                                                                if (currentSubTarget === "全部" || rec.subCategory === currentSubTarget) {
                                                                    visitTargetCount += Object.values(rec.colors || {}).reduce((sum, count) => sum + count, 0);
                                                                }
                                                            }
                                                        });

                                                        return (
                                                            <div key={visit.id} className="relative pl-5 border-l-2 border-emerald-200 ml-2">
                                                                <div className="absolute -left-[9px] top-1 bg-emerald-500 w-4 h-4 rounded-full border-4 border-white shadow-sm"></div>
                                                                <div className="flex justify-between items-center mb-2">
                                                                    <div className="flex items-center gap-2">
                                                                        <h3 className="text-xs font-black text-slate-700 bg-white px-3 py-1 rounded shadow-sm border border-slate-200 flex items-center gap-1.5">
                                                                            <i className="far fa-calendar-alt text-slate-400"></i> {formatDateOnly(visit.date)}
                                                                        </h3>
                                                                        <span className="text-[10px] font-bold text-amber-700 bg-amber-100 px-2 py-1 rounded shadow-sm border border-amber-200">
                                                                            {currentTarget}{currentSubTarget !== "全部" ? ` (${currentSubTarget})` : ""}: {visitTargetCount} 盆
                                                                        </span>
                                                                    </div>
                                                                    <div className="flex gap-3 text-xs">
                                                                        {isAdmin && (
                                                                            <button className="text-emerald-600 font-black hover:underline flex items-center gap-1" onClick={() => handleEditVisit(loc, visit)}>
                                                                                <i className="fas fa-edit text-[10px]"></i>編輯
                                                                            </button>
                                                                        )}
                                                                        {isAdmin && (
                                                                            <button className="text-slate-400 hover:text-red-500 font-medium" onClick={() => handleDeleteVisit(loc.key, visit.id)}>刪除</button>
                                                                        )}
                                                                    </div>
                                                                </div>
                                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-3">
                                                                    {(visit.records || []).map((rec, i) => {
                                                                        const activeColors = Object.entries(rec.colors || {}).filter(([_,v]) => v > 0);
                                                                        if (activeColors.length === 0) return null;
                                                                        return (
                                                                            <div key={i} className="bg-white border border-slate-200 p-3 rounded-xl shadow-sm">
                                                                                <div className="flex items-center gap-2 mb-2 pb-2 border-b border-slate-100">
                                                                                    <span className="text-xs font-black text-emerald-800 bg-emerald-100 px-2 py-0.5 rounded">{rec.category}</span>
                                                                                    {rec.category !== "路邊" && rec.subCategory !== "其他" && <span className="text-xs font-bold text-slate-600 bg-slate-100 px-2 py-0.5 rounded">{rec.subCategory}</span>}
                                                                                </div>
                                                                                <div className="flex flex-wrap gap-1.5">
                                                                                    {activeColors.map(([colorKey, count]) => {
                                                                                        const c = COLORS.find(col => col.id === colorKey);
                                                                                        return c ? (
                                                                                            <span key={colorKey} className={`text-[11px] font-bold px-2 py-0.5 rounded flex items-center gap-1.5 ${c.bg} ${c.text} ${c.border || ''} shadow-sm`}>
                                                                                                {c.label} <span className="bg-black/20 px-1.5 rounded min-w-[1.2rem] text-center">{count}</span>
                                                                                            </span>
                                                                                        ) : null;
                                                                                    })}
                                                                                </div>
                                                                            </div>
                                                                        )
                                                                    })}
                                                                </div>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                            )}
                                        </div>
                                    );
                                })
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
