<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikmin 花朵變異圖鑑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-pink-50 min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, Fragment } = React;

        // ★ 這是你的專屬資料庫 API
        const API_URL = "https://script.google.com/macros/s/AKfycbycku9yqkOe1V2y-PR-A3orEvnMpKZXTZeBdzugSreJRX_iBDsuq7TZhfaQ45M2Lc81XQ/exec";

        const Icon = ({ path, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {path}
            </svg>
        );

        const ICONS = {
            Flower: <path d="M12 2v20M17 5c0 3-5 5-5 5s-5-2-5-5a5 5 0 1 1 10 0z M12 12c0 3 4 4 4 4s-4 1-4 4-4-1-4-4 4-1 4-4z" />,
            Lock: <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />,
            Unlock: <Fragment><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 9.9-1" /></Fragment>,
            Plus: <path d="M5 12h14 M12 5v14" />,
            X: <path d="M18 6 6 18 M6 6l12 12" />,
            ChevronDown: <polyline points="6 9 12 15 18 9" />,
            ChevronUp: <polyline points="18 15 12 9 6 15" />,
            Link: <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71 M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
        };

        const App = () => {
            const [flowers, setFlowers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [expandedFlowers, setExpandedFlowers] = useState(new Set());
            
            // 管理員狀態
            const [isAdmin, setIsAdmin] = useState(false);
            const [password, setPassword] = useState("");

            // 表單狀態
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [formData, setFormData] = useState({
                name: "", date: new Date().toISOString().slice(0, 10), method: "", 
                w: "", b: "", y: "", r: "", imageUrl: ""
            });

            // 取得資料
            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(API_URL);
                    const data = await res.json();
                    
                    // 將平坦的 Excel 每一行資料，整理成「一朵花一個卡片」的格式
                    const grouped = {};
                    data.forEach(row => {
                        const name = row['花朵名稱'];
                        if (!name) return;
                        if (!grouped[name]) {
                            grouped[name] = {
                                name: name,
                                imageUrl: row['圖片網址'] || '',
                                records: []
                            };
                        }
                        // 如果後面有更新的圖片網址，就覆蓋
                        if (row['圖片網址']) grouped[name].imageUrl = row['圖片網址'];
                        
                        if (row['種法']) {
                            grouped[name].records.push({
                                date: row['日期'] || '',
                                method: row['種法'],
                                w: Number(row['白']) || 0,
                                b: Number(row['藍']) || 0,
                                y: Number(row['黃']) || 0,
                                r: Number(row['紅']) || 0,
                            });
                        }
                    });
                    
                    // 依照總樣本數排序（樣本越多的排越前面）
                    const flowerArray = Object.values(grouped).sort((a, b) => {
                        const totalA = a.records.reduce((s, r) => s + r.w + r.b + r.y + r.r, 0);
                        const totalB = b.records.reduce((s, r) => s + r.w + r.b + r.y + r.r, 0);
                        return totalB - totalA;
                    });

                    setFlowers(flowerArray);
                } catch (error) {
                    console.error("載入失敗", error);
                    alert("資料載入失敗，請檢查網路或 API 網址設定！");
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchData();
            }, []);

            const toggleExpandFlower = (name) => {
                const next = new Set(expandedFlowers);
                if (next.has(name)) next.delete(name);
                else next.add(name);
                setExpandedFlowers(next);
            };

            const handleLogin = () => {
                if (isAdmin) {
                    setIsAdmin(false);
                    setPassword("");
                } else {
                    const pwd = prompt("請輸入管理員密碼：");
                    if (pwd) {
                        setIsAdmin(true);
                        setPassword(pwd);
                        alert("已進入管理員模式！");
                    }
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);

                const payload = {
                    password: password,
                    name: formData.name.trim(),
                    date: formData.date,
                    method: formData.method.trim(),
                    w: parseInt(formData.w) || 0,
                    b: parseInt(formData.b) || 0,
                    y: parseInt(formData.y) || 0,
                    r: parseInt(formData.r) || 0,
                    imageUrl: formData.imageUrl.trim()
                };

                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    const result = await res.json();

                    if (result.status === 'success') {
                        setIsModalOpen(false);
                        setFormData({ name: "", date: new Date().toISOString().slice(0, 10), method: "", w: "", b: "", y: "", r: "", imageUrl: "" });
                        // 重新抓取最新資料
                        await fetchData();
                    } else {
                        alert("錯誤：" + result.message);
                        if (result.message.includes("密碼錯誤")) setIsAdmin(false);
                    }
                } catch (error) {
                    alert("傳送失敗，請稍後再試。");
                } finally {
                    setIsSubmitting(false);
                }
            };

            const renderProgressBar = (w, b, y, r) => {
                const total = w + b + y + r;
                if (total === 0) return <div className="h-4 w-full bg-slate-200 rounded-full my-2"></div>;
                return (
                    <div className="h-4 w-full flex rounded-full overflow-hidden my-2 shadow-inner">
                        {w > 0 && <div style={{width: `${(w/total)*100}%`}} className="bg-slate-300" title={`白: ${w}`}></div>}
                        {b > 0 && <div style={{width: `${(b/total)*100}%`}} className="bg-blue-400" title={`藍: ${b}`}></div>}
                        {y > 0 && <div style={{width: `${(y/total)*100}%`}} className="bg-yellow-400" title={`黃: ${y}`}></div>}
                        {r > 0 && <div style={{width: `${(r/total)*100}%`}} className="bg-red-400" title={`紅: ${r}`}></div>}
                    </div>
                );
            };

            const availableFlowerNames = flowers.map(f => f.name);

            return (
                <div className="pb-20">
                    <header className="bg-gradient-to-r from-pink-500 to-rose-500 text-white shadow-lg sticky top-0 z-20">
                        <div className="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <Icon path={ICONS.Flower} className="text-pink-100" />
                                <h1 className="text-xl font-black tracking-wide">Pikmin 花朵變異圖鑑</h1>
                            </div>
                            <div className="flex gap-3 items-center">
                                <button onClick={handleLogin} className={`p-2 rounded-full transition-colors ${isAdmin ? 'bg-white/20 text-yellow-300' : 'hover:bg-white/10 text-pink-100'}`}>
                                    <Icon path={isAdmin ? ICONS.Unlock : ICONS.Lock} />
                                </button>
                                {isAdmin && (
                                    <button onClick={() => setIsModalOpen(true)} className="bg-white text-pink-600 hover:bg-pink-50 px-4 py-2 rounded-full font-bold flex items-center gap-1 text-sm shadow-sm transition-transform active:scale-95">
                                        <Icon path={ICONS.Plus} /> 新增紀錄
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-8">
                        {loading ? (
                            <div className="text-center py-20 flex flex-col items-center">
                                <div className="w-10 h-10 border-4 border-pink-200 border-t-pink-500 rounded-full animate-spin mb-4"></div>
                                <p className="text-pink-600 font-bold animate-pulse">正在讀取最新數據...</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {flowers.map(item => {
                                    const totalW = item.records.reduce((s, r) => s + r.w, 0);
                                    const totalB = item.records.reduce((s, r) => s + r.b, 0);
                                    const totalY = item.records.reduce((s, r) => s + r.y, 0);
                                    const totalR = item.records.reduce((s, r) => s + r.r, 0);
                                    const total = totalW + totalB + totalY + totalR;
                                    
                                    const pW = total ? ((totalW/total)*100).toFixed(1) : "0.0";
                                    const pB = total ? ((totalB/total)*100).toFixed(1) : "0.0";
                                    const pY = total ? ((totalY/total)*100).toFixed(1) : "0.0";
                                    const pR = total ? ((totalR/total)*100).toFixed(1) : "0.0";

                                    const isExpanded = expandedFlowers.has(item.name);

                                    const groupedByMethod = item.records.reduce((acc, r) => {
                                        if (!acc[r.method]) acc[r.method] = { w:0, b:0, y:0, r:0, count:0, list:[] };
                                        acc[r.method].w += r.w; acc[r.method].b += r.b; acc[r.method].y += r.y; acc[r.method].r += r.r;
                                        acc[r.method].count += 1;
                                        // 格式化日期，只取 YYYY-MM-DD
                                        const cleanDate = r.date ? new Date(r.date).toISOString().slice(0, 10) : '無日期';
                                        acc[r.method].list.push({ ...r, date: cleanDate });
                                        return acc;
                                    }, {});

                                    return (
                                        <div key={item.name} className="bg-white rounded-3xl shadow-sm border border-pink-100/50 overflow-hidden hover:shadow-md transition-shadow">
                                            {/* 圖片區塊 (自適應模式) */}
                                            {item.imageUrl ? (
                                                <div className="h-48 w-full bg-slate-50 relative p-2 border-b border-slate-100">
                                                    <img src={item.imageUrl} alt={item.name} className="w-full h-full object-contain" />
                                                </div>
                                            ) : (
                                                <div className="h-20 w-full bg-gradient-to-r from-pink-50 to-rose-50 flex items-center justify-center border-b border-pink-100/50">
                                                    <Icon path={ICONS.Flower} className="text-pink-200 opacity-50 w-8 h-8" />
                                                </div>
                                            )}
                                            
                                            <div className="p-6">
                                                <div className="flex justify-between items-end mb-4">
                                                    <h3 className="text-2xl font-black text-slate-800">{item.name}</h3>
                                                    <div className="flex flex-col items-end">
                                                        <span className="text-[10px] font-bold text-slate-400 mb-0.5">總樣本數</span>
                                                        <span className="text-sm font-black text-pink-600 bg-pink-50 px-3 py-1 rounded-full">{total}</span>
                                                    </div>
                                                </div>
                                                
                                                {renderProgressBar(totalW, totalB, totalY, totalR)}
                                                
                                                {/* 總數儀表板 */}
                                                <div className="flex justify-between text-base font-extrabold text-slate-600 mt-4 mb-2 px-1">
                                                    <div className="flex flex-col items-center text-slate-500">
                                                        <span>⚪ {pW}%</span>
                                                        <span className="text-xs font-bold bg-slate-100 px-2.5 py-0.5 rounded-full mt-1.5">{totalW} 朵</span>
                                                    </div>
                                                    <div className="flex flex-col items-center text-blue-500">
                                                        <span>🔵 {pB}%</span>
                                                        <span className="text-xs font-bold bg-blue-50 px-2.5 py-0.5 rounded-full mt-1.5">{totalB} 朵</span>
                                                    </div>
                                                    <div className="flex flex-col items-center text-yellow-600">
                                                        <span>🟡 {pY}%</span>
                                                        <span className="text-xs font-bold bg-yellow-50 px-2.5 py-0.5 rounded-full mt-1.5">{totalY} 朵</span>
                                                    </div>
                                                    <div className="flex flex-col items-center text-red-500">
                                                        <span>🔴 {pR}%</span>
                                                        <span className="text-xs font-bold bg-red-50 px-2.5 py-0.5 rounded-full mt-1.5">{totalR} 朵</span>
                                                    </div>
                                                </div>

                                                <button onClick={() => toggleExpandFlower(item.name)} className="w-full mt-6 py-3 bg-slate-50 hover:bg-pink-50 text-slate-500 hover:text-pink-600 rounded-xl text-sm font-bold flex justify-center items-center gap-1.5 transition-colors">
                                                    {isExpanded ? <><Icon path={ICONS.ChevronUp}/> 收起詳細實驗數據</> : <><Icon path={ICONS.ChevronDown}/> 展開詳細實驗數據</>}
                                                </button>

                                                {/* 展開的明細 */}
                                                {isExpanded && (
                                                    <div className="mt-5 pt-5 border-t-2 border-dashed border-slate-100 space-y-6">
                                                        {Object.keys(groupedByMethod).length === 0 ? (
                                                            <p className="text-center text-sm font-medium text-slate-400 py-4">目前尚無實驗紀錄</p>
                                                        ) : (
                                                            Object.entries(groupedByMethod).map(([method, stats]) => {
                                                                const stTotal = stats.w + stats.b + stats.y + stats.r;
                                                                return (
                                                                    <div key={method} className="bg-white rounded-2xl p-4 border border-slate-100 shadow-sm">
                                                                        <div className="flex justify-between items-center mb-3">
                                                                            <span className="text-sm font-black text-slate-700 bg-slate-100 px-3 py-1 rounded-lg">🏷️ {method}</span>
                                                                            <span className="text-xs font-bold text-slate-400">共 {stTotal} 朵</span>
                                                                        </div>
                                                                        {renderProgressBar(stats.w, stats.b, stats.y, stats.r)}
                                                                        
                                                                        <div className="flex justify-between text-sm font-extrabold text-slate-500 mt-3 mb-4">
                                                                            <span className="text-slate-500">⚪ {stTotal ? ((stats.w/stTotal)*100).toFixed(1) : "0.0"}% <span className="text-[10px] font-medium ml-0.5">({stats.w})</span></span>
                                                                            <span className="text-blue-500">🔵 {stTotal ? ((stats.b/stTotal)*100).toFixed(1) : "0.0"}% <span className="text-[10px] font-medium ml-0.5">({stats.b})</span></span>
                                                                            <span className="text-yellow-600">🟡 {stTotal ? ((stats.y/stTotal)*100).toFixed(1) : "0.0"}% <span className="text-[10px] font-medium ml-0.5">({stats.y})</span></span>
                                                                            <span className="text-red-500">🔴 {stTotal ? ((stats.r/stTotal)*100).toFixed(1) : "0.0"}% <span className="text-[10px] font-medium ml-0.5">({stats.r})</span></span>
                                                                        </div>

                                                                        <div className="mt-4 pt-3 border-t border-slate-100 space-y-1.5">
                                                                            <p className="text-[10px] font-bold text-slate-400 mb-2">實驗明細：</p>
                                                                            {stats.list.map((r, i) => (
                                                                                <div key={i} className="flex justify-between items-center text-xs font-bold text-slate-500 bg-slate-50 px-2 py-1.5 rounded-lg">
                                                                                    <span>📅 {r.date}</span>
                                                                                    <span className="tracking-widest">⚪{r.w} 🔵{r.b} 🟡{r.y} 🔴{r.r}</span>
                                                                                </div>
                                                                            ))}
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })
                                                        )}
                                                        {isAdmin && (
                                                            <div className="text-center bg-yellow-50 text-yellow-700 text-xs font-bold p-3 rounded-lg">
                                                                💡 修改或刪除資料，請直接至 Google 試算表操作。
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    {/* 新增紀錄 Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md flex flex-col max-h-[90vh]">
                                <div className="px-6 py-5 border-b border-slate-100 flex justify-between items-center">
                                    <h3 className="text-xl font-black text-pink-600 flex items-center gap-2">
                                        <Icon path={ICONS.Plus} /> 新增花朵紀錄
                                    </h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-slate-600 bg-slate-100 p-1.5 rounded-full"><Icon path={ICONS.X} /></button>
                                </div>
                                <form onSubmit={handleSubmit} className="p-6 space-y-5 overflow-y-auto">
                                    
                                    <div className="bg-pink-50 p-4 rounded-2xl space-y-4 border border-pink-100">
                                        <div>
                                            <label className="text-sm font-black text-slate-700 block mb-1.5">1. 花朵名稱 (必填)</label>
                                            <input list="flower-opts" required className="w-full border-0 rounded-xl p-3 text-base shadow-sm focus:ring-2 focus:ring-pink-500 outline-none" placeholder="例如：油菜花" value={formData.name} onChange={e => setFormData({ ...formData, name: e.target.value })} />
                                            <datalist id="flower-opts">
                                                {availableFlowerNames.map(f => <option key={f} value={f} />)}
                                            </datalist>
                                        </div>
                                        <div>
                                            <label className="text-sm font-black text-slate-700 flex items-center gap-1 mb-1.5">
                                                2. 花朵封面圖片網址 <span className="text-xs font-medium text-pink-500">(無則留空)</span>
                                            </label>
                                            <div className="relative">
                                                <div className="absolute left-3 top-3.5 text-slate-400"><Icon path={ICONS.Link} /></div>
                                                <input type="url" placeholder="https://i.imgur.com/..." className="w-full border-0 rounded-xl pl-9 pr-3 py-3 text-sm shadow-sm focus:ring-2 focus:ring-pink-500 outline-none" value={formData.imageUrl} onChange={e => setFormData({ ...formData, imageUrl: e.target.value })} />
                                            </div>
                                            <p className="text-[10px] text-slate-400 mt-1.5 leading-tight">如果這朵花已經有圖片，留空就會沿用舊圖。若填寫新網址，會覆蓋舊有圖片。</p>
                                        </div>
                                    </div>

                                    <div className="bg-slate-50 p-4 rounded-2xl space-y-4 border border-slate-100">
                                        <h4 className="text-sm font-black text-slate-700 border-b border-slate-200 pb-2">3. 實驗數據 (必填)</h4>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="text-xs font-bold text-slate-500 block mb-1">實驗日期</label><input type="date" required className="w-full border-0 shadow-sm rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-pink-500" value={formData.date} onChange={e => setFormData({ ...formData, date: e.target.value })} /></div>
                                            <div><label className="text-xs font-bold text-slate-500 block mb-1">種法 (Tag)</label><input type="text" required placeholder="例如: 雙色+櫻花" className="w-full border-0 shadow-sm rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-pink-500" value={formData.method} onChange={e => setFormData({ ...formData, method: e.target.value })} /></div>
                                        </div>
                                        <div className="grid grid-cols-4 gap-3 pt-2">
                                            <div><label className="text-sm font-black text-slate-400 block mb-1.5 text-center">白</label><input type="number" min="0" className="w-full border-0 shadow-sm rounded-xl p-2.5 text-base text-center outline-none focus:ring-2 focus:ring-slate-300" value={formData.w} onChange={e => setFormData({...formData, w: e.target.value})} /></div>
                                            <div><label className="text-sm font-black text-blue-500 block mb-1.5 text-center">藍</label><input type="number" min="0" className="w-full border-0 shadow-sm rounded-xl p-2.5 text-base text-center text-blue-700 bg-blue-50 outline-none focus:ring-2 focus:ring-blue-300" value={formData.b} onChange={e => setFormData({...formData, b: e.target.value})} /></div>
                                            <div><label className="text-sm font-black text-yellow-500 block mb-1.5 text-center">黃</label><input type="number" min="0" className="w-full border-0 shadow-sm rounded-xl p-2.5 text-base text-center text-yellow-700 bg-yellow-50 outline-none focus:ring-2 focus:ring-yellow-300" value={formData.y} onChange={e => setFormData({...formData, y: e.target.value})} /></div>
                                            <div><label className="text-sm font-black text-red-500 block mb-1.5 text-center">紅</label><input type="number" min="0" className="w-full border-0 shadow-sm rounded-xl p-2.5 text-base text-center text-red-700 bg-red-50 outline-none focus:ring-2 focus:ring-red-300" value={formData.r} onChange={e => setFormData({...formData, r: e.target.value})} /></div>
                                        </div>
                                    </div>

                                    <div className="pt-2 flex gap-3">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-xl transition-colors">取消</button>
                                        <button type="submit" disabled={isSubmitting} className="flex-[2] py-3.5 bg-gradient-to-r from-pink-500 to-rose-500 text-white font-black rounded-xl shadow-lg hover:shadow-xl transition-all active:scale-95 disabled:opacity-50">
                                            {isSubmitting ? '資料傳送中...' : '確認儲存並寫入'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
