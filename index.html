<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikmin 花朵變異圖鑑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-emerald-50 min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, Fragment, useCallback } = React;

        const API_URL = "https://script.google.com/macros/s/AKfycbwuW-ao7uazpgYnjKH8Tlk1tk2f0vn5CQN7KzJzTktSzlPiO4MwJy9x1eKYMZxKSAFdQQ/exec";

        const getLocalISODate = () => {
            const d = new Date();
            d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
            return d.toISOString().slice(0, 10);
        };

        const Icon = ({ path, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {path}
            </svg>
        );

        const ICONS = {
            Flower: <path d="M12 2v20M17 5c0 3-5 5-5 5s-5-2-5-5a5 5 0 1 1 10 0z M12 12c0 3 4 4 4 4s-4 1-4 4-4-1-4-4 4-1 4-4z" />,
            Lock: <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />,
            Unlock: <Fragment><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 9.9-1" /></Fragment>,
            Plus: <path d="M5 12h14 M12 5v14" />,
            X: <path d="M18 6 6 18 M6 6l12 12" />,
            ChevronDown: <polyline points="6 9 12 15 18 9" />,
            ChevronUp: <polyline points="18 15 12 9 6 15" />,
            Link: <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71 M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />,
            Edit2: <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" />,
            Trash2: <path d="M3 6h18 M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6 M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2 M10 11v6 M14 11v6" />,
            MapPin: <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />,
            Locate: <Fragment><circle cx="12" cy="12" r="3" /><path d="M19 12h2M3 12h2M12 19v2M12 3v2M16.24 16.24A6 6 0 1 0 7.76 7.76a6 6 0 0 0 8.48 8.48z" /></Fragment>
        };

        const App = () => {
            const [flowers, setFlowers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [expandedFlowers, setExpandedFlowers] = useState(new Set());
            
            const [isAdmin, setIsAdmin] = useState(false);
            const [password, setPassword] = useState("");
            const [isLoggingIn, setIsLoggingIn] = useState(false);

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            
            const [formData, setFormData] = useState({
                _rowNumber: null, name: "", date: getLocalISODate(), 
                method: "", w: "", b: "", y: "", r: "", imageUrl: "", lat: "", lng: ""
            });
            const [locationCountry, setLocationCountry] = useState("");
            const [isDetectingLocation, setIsDetectingLocation] = useState(false);
            const [isFetchingGPS, setIsFetchingGPS] = useState(false);

            const detectCountry = useCallback(async (lat, lng) => {
                if (!lat || !lng) {
                    setLocationCountry("");
                    return;
                }
                setIsDetectingLocation(true);
                try {
                    const response = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=zh-tw`);
                    const data = await response.json();
                    if (data && data.countryName) {
                        setLocationCountry(data.countryName);
                    } else {
                        setLocationCountry("未知國家");
                    }
                } catch (error) {
                    setLocationCountry("無法辨識");
                } finally {
                    setIsDetectingLocation(false);
                }
            }, []);

            useEffect(() => {
                const timeoutId = setTimeout(() => {
                    if (formData.lat && formData.lng) {
                        detectCountry(formData.lat, formData.lng);
                    } else {
                        setLocationCountry("");
                    }
                }, 800);
                return () => clearTimeout(timeoutId);
            }, [formData.lat, formData.lng, detectCountry]);

            const handleGetLocation = () => {
                if (!navigator.geolocation) {
                    alert("你的瀏覽器不支援自動定位功能喔！");
                    return;
                }
                setIsFetchingGPS(true);
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const newLat = position.coords.latitude.toFixed(6);
                        const newLng = position.coords.longitude.toFixed(6);
                        setFormData(prev => ({ ...prev, lat: newLat, lng: newLng }));
                        setIsFetchingGPS(false);
                    },
                    (error) => {
                        alert("無法取得位置！請確認你是否已經允許這個網頁存取你的定位權限。");
                        setIsFetchingGPS(false);
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            };

            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(API_URL);
                    const data = await res.json();
                    
                    const grouped = {};
                    data.forEach(row => {
                        const name = row['花朵名稱'];
                        if (!name) return;
                        if (!grouped[name]) {
                            grouped[name] = { name: name, imageUrl: row['圖片網址'] || '', records: [] };
                        }
                        if (row['圖片網址']) grouped[name].imageUrl = row['圖片網址'];
                        
                        if (row['種法']) {
                            let cleanDate = row['日期'] ? String(row['日期']).replace(/\//g, '-').split('T')[0] : '無日期';

                            grouped[name].records.push({
                                _rowNumber: row['_rowNumber'],
                                date: cleanDate,
                                method: row['種法'],
                                w: Number(row['白']) || 0,
                                b: Number(row['藍']) || 0,
                                y: Number(row['黃']) || 0,
                                r: Number(row['紅']) || 0,
                                imageUrl: row['圖片網址'] || '',
                                lat: row['緯度'] || '',
                                lng: row['經度'] || '',
                                country: row['國家'] || ''
                            });
                        }
                    });
                    
                    const flowerArray = Object.values(grouped).sort((a, b) => {
                        const totalA = a.records.reduce((s, r) => s + r.w + r.b + r.y + r.r, 0);
                        const totalB = b.records.reduce((s, r) => s + r.w + r.b + r.y + r.r, 0);
                        return totalB - totalA;
                    });

                    setFlowers(flowerArray);
                } catch (error) {
                    alert("資料載入失敗，請檢查網路或 API 網址設定！");
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { fetchData(); }, []);

            const toggleExpandFlower = (name) => {
                const next = new Set(expandedFlowers);
                if (next.has(name)) next.delete(name);
                else next.add(name);
                setExpandedFlowers(next);
            };

            const handleLogin = async () => {
                if (isAdmin) {
                    setIsAdmin(false); 
                    setPassword("");
                } else {
                    const pwd = prompt("請輸入管理員密碼：");
                    if (pwd) {
                        setIsLoggingIn(true);
                        try {
                            const res = await fetch(API_URL, {
                                method: 'POST',
                                body: JSON.stringify({ action: 'verify', password: pwd })
                            });
                            const result = await res.json();
                            
                            if (result.status === 'success') {
                                setIsAdmin(true); 
                                setPassword(pwd);
                                alert("✅ " + result.message + "！已解鎖管理員功能。");
                            } else {
                                alert("❌ " + result.message);
                            }
                        } catch (error) {
                            alert("連線驗證失敗，請檢查網路設定。");
                        } finally {
                            setIsLoggingIn(false);
                        }
                    }
                }
            };

            const handleOpenModalNew = () => {
                setFormData({ _rowNumber: null, name: "", date: getLocalISODate(), method: "", w: "", b: "", y: "", r: "", imageUrl: "", lat: "", lng: "" });
                setLocationCountry("");
                setIsModalOpen(true);
            };

            const handleOpenModalRecord = (flower) => {
                setFormData({ _rowNumber: null, name: flower.name, date: getLocalISODate(), method: "", w: "", b: "", y: "", r: "", imageUrl: flower.imageUrl, lat: "", lng: "" });
                setLocationCountry("");
                setIsModalOpen(true);
            };

            const handleEditRecord = (flowerName, record) => {
                setFormData({
                    _rowNumber: record._rowNumber,
                    name: flowerName,
                    date: record.date,
                    method: record.method,
                    w: record.w, b: record.b, y: record.y, r: record.r,
                    imageUrl: record.imageUrl || "",
                    lat: record.lat || "",
                    lng: record.lng || ""
                });
                setLocationCountry(record.country || "");
                setIsModalOpen(true);
            };

            const handleDeleteRecord = async (rowNumber) => {
                if (!confirm("確定要刪除這筆紀錄嗎？這將會同步從 Google 試算表中移除！")) return;
                setIsSubmitting(true);
                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'delete', rowNumber: rowNumber, password: password })
                    });
                    const result = await res.json();
                    if (result.status === 'success') {
                        await fetchData();
                    } else {
                        alert("錯誤：" + result.message);
                    }
                } catch (error) {
                    alert("刪除失敗，請稍後再試。");
                } finally {
                    setIsSubmitting(false);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);

                const payload = {
                    action: formData._rowNumber ? 'edit' : 'add',
                    rowNumber: formData._rowNumber,
                    password: password,
                    name: String(formData.name || "").trim(),
                    date: formData.date,
                    method: String(formData.method || "").trim(),
                    w: parseInt(formData.w) || 0,
                    b: parseInt(formData.b) || 0,
                    y: parseInt(formData.y) || 0,
                    r: parseInt(formData.r) || 0,
                    imageUrl: String(formData.imageUrl || "").trim(),
                    lat: String(formData.lat || "").trim(),
                    lng: String(formData.lng || "").trim(),
                    country: locationCountry
                };

                try {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await res.json();

                    if (result.status === 'success') {
                        setIsModalOpen(false);
                        await fetchData();
                    } else {
                        alert("錯誤：" + result.message);
                        if (result.message.includes("密碼錯誤")) setIsAdmin(false);
                    }
                } catch (error) {
                    alert("傳送失敗，請稍後再試。");
                } finally {
                    setIsSubmitting(false);
                }
            };

            // 用於繪製小進度條 (單次實驗)
            const renderMiniProgressBar = (w, b, y, r) => {
                const total = w + b + y + r;
                if (total === 0) return null;
                return (
                    <div className="h-1.5 w-full flex rounded-full overflow-hidden mt-1 opacity-70">
                        {w > 0 && <div style={{width: `${(w/total)*100}%`}} className="bg-slate-300"></div>}
                        {b > 0 && <div style={{width: `${(b/total)*100}%`}} className="bg-blue-400"></div>}
                        {y > 0 && <div style={{width: `${(y/total)*100}%`}} className="bg-yellow-400"></div>}
                        {r > 0 && <div style={{width: `${(r/total)*100}%`}} className="bg-red-400"></div>}
                    </div>
                );
            };

            const renderProgressBar = (w, b, y, r) => {
                const total = w + b + y + r;
                if (total === 0) return <div className="h-4 w-full bg-slate-200 rounded-full my-2"></div>;
                return (
                    <div className="h-4 w-full flex rounded-full overflow-hidden my-2 shadow-inner">
                        {w > 0 && <div style={{width: `${(w/total)*100}%`}} className="bg-slate-300" title={`白: ${w}`}></div>}
                        {b > 0 && <div style={{width: `${(b/total)*100}%`}} className="bg-blue-400" title={`藍: ${b}`}></div>}
                        {y > 0 && <div style={{width: `${(y/total)*100}%`}} className="bg-yellow-400" title={`黃: ${y}`}></div>}
                        {r > 0 && <div style={{width: `${(r/total)*100}%`}} className="bg-red-400" title={`紅: ${r}`}></div>}
                    </div>
                );
            };

            const availableFlowerNames = flowers.map(f => f.name);

            return (
                <div className="pb-20">
                    <header className="bg-gradient-to-r from-emerald-600 to-teal-600 text-white shadow-lg sticky top-0 z-20">
                        <div className="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <Icon path={ICONS.Flower} className="text-emerald-100" />
                                <h1 className="text-xl font-black tracking-wide">Pikmin 花朵變異圖鑑</h1>
                            </div>
                            <div className="flex gap-3 items-center">
                                <button onClick={handleLogin} disabled={isLoggingIn} className={`p-2 rounded-full transition-colors ${isAdmin ? 'bg-white/20 text-yellow-300' : 'hover:bg-white/10 text-emerald-100'} ${isLoggingIn ? 'opacity-50 cursor-wait' : ''}`}>
                                    {isLoggingIn ? <div className="w-4 h-4 border-2 border-emerald-100 border-t-transparent rounded-full animate-spin"></div> : <Icon path={isAdmin ? ICONS.Unlock : ICONS.Lock} />}
                                </button>
                                {isAdmin && (
                                    <button onClick={handleOpenModalNew} className="bg-white text-emerald-700 hover:bg-emerald-50 px-4 py-2 rounded-full font-bold flex items-center gap-1 text-sm shadow-sm transition-transform active:scale-95 disabled:opacity-50" disabled={isSubmitting}>
                                        <Icon path={ICONS.Plus} /> 新增紀錄
                                    </button>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-8">
                        {loading ? (
                            <div className="text-center py-20 flex flex-col items-center">
                                <div className="w-10 h-10 border-4 border-emerald-200 border-t-emerald-600 rounded-full animate-spin mb-4"></div>
                                <p className="text-emerald-700 font-bold animate-pulse">正在讀取最新數據...</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                {flowers.map(item => {
                                    const totalW = item.records.reduce((s, r) => s + r.w, 0);
                                    const totalB = item.records.reduce((s, r) => s + r.b, 0);
                                    const totalY = item.records.reduce((s, r) => s + r.y, 0);
                                    const totalR = item.records.reduce((s, r) => s + r.r, 0);
                                    const total = totalW + totalB + totalY + totalR;
                                    
                                    const pW = total ? ((totalW/total)*100).toFixed(1) : "0.0";
                                    const pB = total ? ((totalB/total)*100).toFixed(1) : "0.0";
                                    const pY = total ? ((totalY/total)*100).toFixed(1) : "0.0";
                                    const pR = total ? ((totalR/total)*100).toFixed(1) : "0.0";

                                    const isExpanded = expandedFlowers.has(item.name);

                                    const groupedByMethod = item.records.reduce((acc, r) => {
                                        if (!acc[r.method]) acc[r.method] = { w:0, b:0, y:0, r:0, count:0, list:[] };
                                        acc[r.method].w += r.w; acc[r.method].b += r.b; acc[r.method].y += r.y; acc[r.method].r += r.r;
                                        acc[r.method].count += 1;
                                        acc[r.method].list.push(r);
                                        return acc;
                                    }, {});

                                    return (
                                        <div key={item.name} className="bg-white rounded-3xl shadow-sm border border-emerald-100/60 overflow-hidden hover:shadow-md transition-shadow">
                                            {item.imageUrl ? (
                                                <div className="h-48 w-full bg-slate-50 relative p-2 border-b border-slate-100">
                                                    <img src={item.imageUrl} alt={item.name} className="w-full h-full object-contain" />
                                                </div>
                                            ) : (
                                                <div className="h-20 w-full bg-gradient-to-r from-emerald-50 to-teal-50 flex items-center justify-center border-b border-emerald-100/50">
                                                    <Icon path={ICONS.Flower} className="text-emerald-200 opacity-60 w-8 h-8" />
                                                </div>
                                            )}
                                            
                                            <div className="p-6">
                                                <div className="flex justify-between items-end mb-4">
                                                    <h3 className="text-2xl font-black text-slate-800">{item.name}</h3>
                                                    <div className="flex flex-col items-end">
                                                        <span className="text-[10px] font-bold text-slate-400 mb-0.5">總樣本數</span>
                                                        <span className="text-sm font-black text-emerald-700 bg-emerald-50 px-3 py-1 rounded-full">{total}</span>
                                                    </div>
                                                </div>
                                                
                                                {renderProgressBar(totalW, totalB, totalY, totalR)}
                                                
                                                <div className="flex justify-between text-base font-extrabold text-slate-600 mt-4 mb-2 px-1">
                                                    <div className="flex flex-col items-center text-slate-500">
                                                        <span>⚪ {pW}%</span>
                                                        <span className="text-xs font-bold bg-slate-100 px-2.5 py-0.5 rounded-full mt-1.5">{totalW} 朵</span>
                                                    </div>
                                                    <div className="flex flex-col items-center text-blue-500">
                                                        <span>🔵 {pB}%</span>
                                                        <span className="text-xs font-bold bg-blue-50 px-2.5 py-0.5 rounded-full mt-1.5">{totalB} 朵</span>
                                                    </div>
                                                    <div className="flex flex-col items-center text-yellow-600">
                                                        <span>🟡 {pY}%</span>
                                                        <span className="text-xs font-bold bg-yellow-50 px-2.5 py-0.5 rounded-full mt-1.5">{totalY} 朵</span>
                                                    </div>
                                                    <div className="flex flex-col items-center text-red-500">
                                                        <span>🔴 {pR}%</span>
                                                        <span className="text-xs font-bold bg-red-50 px-2.5 py-0.5 rounded-full mt-1.5">{totalR} 朵</span>
                                                    </div>
                                                </div>

                                                <button onClick={() => toggleExpandFlower(item.name)} className="w-full mt-6 py-3 bg-slate-50 hover:bg-emerald-50 text-slate-500 hover:text-emerald-700 rounded-xl text-sm font-bold flex justify-center items-center gap-1.5 transition-colors">
                                                    {isExpanded ? <><Icon path={ICONS.ChevronUp}/> 收起詳細實驗數據</> : <><Icon path={ICONS.ChevronDown}/> 展開詳細實驗數據</>}
                                                </button>

                                                {isExpanded && (
                                                    <div className="mt-5 pt-5 border-t-2 border-dashed border-slate-100 space-y-6">
                                                        {Object.keys(groupedByMethod).length === 0 ? (
                                                            <p className="text-center text-sm font-medium text-slate-400 py-4">目前尚無實驗紀錄</p>
                                                        ) : (
                                                            Object.entries(groupedByMethod).map(([method, stats]) => {
                                                                const stTotal = stats.w + stats.b + stats.y + stats.r;
                                                                return (
                                                                    <div key={method} className="bg-white rounded-2xl p-4 border border-slate-100 shadow-sm">
                                                                        <div className="flex justify-between items-center mb-3">
                                                                            <span className="text-sm font-black text-emerald-800 bg-emerald-50 border border-emerald-100 px-3 py-1 rounded-lg">🏷️ {method}</span>
                                                                            <span className="text-xs font-bold text-slate-400">共 {stTotal} 朵</span>
                                                                        </div>
                                                                        {renderProgressBar(stats.w, stats.b, stats.y, stats.r)}
                                                                        
                                                                        <div className="flex justify-between text-sm font-extrabold text-slate-500 mt-3 mb-4">
                                                                            <span className="text-slate-500">⚪ {stTotal ? ((stats.w/stTotal)*100).toFixed(1) : "0.0"}%</span>
                                                                            <span className="text-blue-500">🔵 {stTotal ? ((stats.b/stTotal)*100).toFixed(1) : "0.0"}%</span>
                                                                            <span className="text-yellow-600">🟡 {stTotal ? ((stats.y/stTotal)*100).toFixed(1) : "0.0"}%</span>
                                                                            <span className="text-red-500">🔴 {stTotal ? ((stats.r/stTotal)*100).toFixed(1) : "0.0"}%</span>
                                                                        </div>

                                                                        <div className="mt-4 pt-3 border-t border-slate-100 space-y-2">
                                                                            <p className="text-[10px] font-bold text-slate-400 mb-2">實驗明細：</p>
                                                                            {stats.list.map((r, i) => {
                                                                                // ★ 計算單次機率
                                                                                const rTotal = r.w + r.b + r.y + r.r;
                                                                                const rpW = rTotal ? ((r.w/rTotal)*100).toFixed(0) : "0";
                                                                                const rpB = rTotal ? ((r.b/rTotal)*100).toFixed(0) : "0";
                                                                                const rpY = rTotal ? ((r.y/rTotal)*100).toFixed(0) : "0";
                                                                                const rpR = rTotal ? ((r.r/rTotal)*100).toFixed(0) : "0";

                                                                                return (
                                                                                    <div key={i} className="flex flex-col bg-slate-50 p-2.5 rounded-lg border border-transparent hover:border-emerald-100 hover:bg-emerald-50 transition-colors">
                                                                                        <div className="flex justify-between items-center text-xs font-bold text-slate-500 mb-1.5">
                                                                                            <span>📅 {r.date}</span>
                                                                                            <div className="flex items-center gap-2">
                                                                                                <span className="tracking-widest">⚪{r.w} 🔵{r.b} 🟡{r.y} 🔴{r.r}</span>
                                                                                                {isAdmin && (
                                                                                                    <div className="flex gap-1 ml-2 pl-2 border-l border-slate-200">
                                                                                                        <button onClick={() => handleEditRecord(item.name, r)} disabled={isSubmitting} className="text-emerald-500 hover:text-emerald-700 bg-white p-1 rounded shadow-sm border border-slate-100 disabled:opacity-50"><Icon path={ICONS.Edit2}/></button>
                                                                                                        <button onClick={() => handleDeleteRecord(r._rowNumber)} disabled={isSubmitting} className="text-red-400 hover:text-red-600 bg-white p-1 rounded shadow-sm border border-slate-100 disabled:opacity-50"><Icon path={ICONS.Trash2}/></button>
                                                                                                    </div>
                                                                                                )}
                                                                                            </div>
                                                                                        </div>
                                                                                        
                                                                                        {/* ★ 單次獨立機率與迷你進度條 */}
                                                                                        <div className="flex justify-between items-center">
                                                                                            <div className="flex-1 mr-4">
                                                                                                {renderMiniProgressBar(r.w, r.b, r.y, r.r)}
                                                                                            </div>
                                                                                            <div className="flex gap-2 text-[10px] font-bold">
                                                                                                {r.w > 0 && <span className="text-slate-400">{rpW}%</span>}
                                                                                                {r.b > 0 && <span className="text-blue-400">{rpB}%</span>}
                                                                                                {r.y > 0 && <span className="text-yellow-500">{rpY}%</span>}
                                                                                                {r.r > 0 && <span className="text-red-400">{rpR}%</span>}
                                                                                            </div>
                                                                                        </div>
                                                                                        
                                                                                        {/* 只有管理員模式下才能看到經緯度連結 */}
                                                                                        {(r.country || (isAdmin && r.lat && r.lng)) && (
                                                                                            <div className="flex items-center gap-1 text-[10px] text-slate-500 bg-white w-fit px-2 py-1 rounded border border-slate-100 mt-2">
                                                                                                <Icon path={ICONS.MapPin} className="w-3 h-3 text-emerald-500" />
                                                                                                {r.country && <span className="font-bold text-emerald-700">{r.country}</span>}
                                                                                                
                                                                                                {(isAdmin && r.lat && r.lng) && (
                                                                                                    <a href={`https://www.google.com/maps/search/?api=1&query=$${r.lat},${r.lng}`} target="_blank" rel="noreferrer" className="text-blue-500 hover:underline ml-1">
                                                                                                        ({r.lat}, {r.lng})
                                                                                                    </a>
                                                                                                )}
                                                                                            </div>
                                                                                        )}
                                                                                    </div>
                                                                                );
                                                                            })}
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })
                                                        )}
                                                        {isAdmin && (
                                                            <button onClick={() => handleOpenModalRecord(item)} disabled={isSubmitting} className="w-full py-3 bg-emerald-50 text-emerald-700 font-bold text-sm rounded-xl flex justify-center items-center gap-1.5 hover:bg-emerald-100 transition-colors border border-emerald-200 border-dashed disabled:opacity-50">
                                                                <Icon path={ICONS.Plus}/> 新增「{item.name}」的實驗紀錄
                                                            </button>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md flex flex-col max-h-[90vh]">
                                <div className="px-6 py-5 border-b border-slate-100 flex justify-between items-center">
                                    <h3 className="text-xl font-black text-emerald-700 flex items-center gap-2">
                                        <Icon path={formData._rowNumber ? ICONS.Edit2 : ICONS.Plus} /> 
                                        {formData._rowNumber ? `編輯實驗紀錄` : `新增花朵紀錄`}
                                    </h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-slate-600 bg-slate-100 p-1.5 rounded-full"><Icon path={ICONS.X} /></button>
                                </div>
                                <form onSubmit={handleSubmit} className="p-6 space-y-5 overflow-y-auto">
                                    
                                    <div className="bg-emerald-50 p-4 rounded-2xl space-y-4 border border-emerald-100">
                                        <div>
                                            <label className="text-sm font-black text-slate-700 block mb-1.5">1. 花朵名稱 (必填)</label>
                                            <input list="flower-opts" required className="w-full border-0 rounded-xl p-3 text-base shadow-sm focus:ring-2 focus:ring-emerald-500 outline-none" placeholder="例如：油菜花" value={formData.name} onChange={e => setFormData({ ...formData, name: e.target.value })} />
                                            <datalist id="flower-opts">
                                                {availableFlowerNames.map(f => <option key={f} value={f} />)}
                                            </datalist>
                                        </div>
                                        <div>
                                            <label className="text-sm font-black text-slate-700 flex items-center gap-1 mb-1.5">
                                                2. 花朵封面圖片網址 <span className="text-xs font-medium text-emerald-500">(無則留空)</span>
                                            </label>
                                            <div className="relative">
                                                <div className="absolute left-3 top-3.5 text-slate-400"><Icon path={ICONS.Link} /></div>
                                                <input type="url" placeholder="https://i.imgur.com/..." className="w-full border-0 rounded-xl pl-9 pr-3 py-3 text-sm shadow-sm focus:ring-2 focus:ring-emerald-500 outline-none" value={formData.imageUrl} onChange={e => setFormData({ ...formData, imageUrl: e.target.value })} />
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-50 p-4 rounded-2xl space-y-4 border border-slate-100">
                                        <h4 className="text-sm font-black text-slate-700 border-b border-slate-200 pb-2">3. 實驗數據 (必填)</h4>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div><label className="text-xs font-bold text-slate-500 block mb-1">實驗日期</label><input type="date" required className="w-full border-0 shadow-sm rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-emerald-500" value={formData.date} onChange={e => setFormData({ ...formData, date: e.target.value })} /></div>
                                            <div><label className="text-xs font-bold text-slate-500 block mb-1">種法 (Tag)</label><input type="text" required placeholder="例如: 雙色+櫻花" className="w-full border-0 shadow-sm rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-emerald-500" value={formData.method} onChange={e => setFormData({ ...formData, method: e.target.value })} /></div>
                                        </div>
                                        <div className="grid grid-cols-4 gap-3 pt-2">
                                            <div><label className="text-sm font-black text-slate-400 block mb-1.5 text-center">白</label><input type="number" min="0" required className="w-full border-0 shadow-sm rounded-xl p-2.5 text-base text-center outline-none focus:ring-2 focus:ring-slate-300" value={formData.w} onChange={e => setFormData({...formData, w: e.target.value})} /></div>
                                            <div><label className="text-sm font-black text-blue-500 block mb-1.5 text-center">藍</label><input type="number" min="0" required className="w-full border-0 shadow-sm rounded-xl p-2.5 text-base text-center text-blue-700 bg-blue-50 outline-none focus:ring-2 focus:ring-blue-300" value={formData.b} onChange={e => setFormData({...formData, b: e.target.value})} /></div>
                                            <div><label className="text-sm font-black text-yellow-500 block mb-1.5 text-center">黃</label><input type="number" min="0" required className="w-full border-0 shadow-sm rounded-xl p-2.5 text-base text-center text-yellow-700 bg-yellow-50 outline-none focus:ring-2 focus:ring-yellow-300" value={formData.y} onChange={e => setFormData({...formData, y: e.target.value})} /></div>
                                            <div><label className="text-sm font-black text-red-500 block mb-1.5 text-center">紅</label><input type="number" min="0" required className="w-full border-0 shadow-sm rounded-xl p-2.5 text-base text-center text-red-700 bg-red-50 outline-none focus:ring-2 focus:ring-red-300" value={formData.r} onChange={e => setFormData({...formData, r: e.target.value})} /></div>
                                        </div>
                                    </div>

                                    <div className="bg-sky-50 p-4 rounded-2xl space-y-4 border border-sky-100">
                                        <div className="flex justify-between items-center border-b border-sky-200 pb-2">
                                            <h4 className="text-sm font-black text-sky-700">4. 地點資訊 (選填)</h4>
                                            <button type="button" onClick={handleGetLocation} disabled={isFetchingGPS} className="bg-sky-600 hover:bg-sky-700 text-white text-xs font-bold px-3 py-1.5 rounded-lg flex items-center gap-1 shadow-sm transition-colors disabled:opacity-50">
                                                <Icon path={ICONS.Locate} /> 
                                                {isFetchingGPS ? "定位中..." : "自動抓取定位"}
                                            </button>
                                        </div>
                                        <p className="text-[10px] text-sky-600/80 -mt-2">直接在下方輸入經緯度，系統也會自動幫你翻譯成國家。</p>
                                        
                                        <div className="grid grid-cols-2 gap-4 mt-2">
                                            <div>
                                                <label className="text-xs font-bold text-sky-600 block mb-1">緯度 (Lat)</label>
                                                <input type="text" placeholder="例如: 25.189888" className="w-full border-0 shadow-sm rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-sky-500" value={formData.lat} onChange={e => setFormData({ ...formData, lat: e.target.value })} />
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-sky-600 block mb-1">經度 (Lng)</label>
                                                <input type="text" placeholder="例如: 121.488269" className="w-full border-0 shadow-sm rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-sky-500" value={formData.lng} onChange={e => setFormData({ ...formData, lng: e.target.value })} />
                                            </div>
                                        </div>
                                        
                                        <div className="flex items-center gap-2 mt-2">
                                            <Icon path={ICONS.MapPin} className="text-sky-500 w-4 h-4" />
                                            <span className="text-xs font-bold text-sky-700">自動辨識國家：</span>
                                            {isDetectingLocation ? (
                                                <span className="text-xs text-slate-500 animate-pulse">正在搜尋...</span>
                                            ) : (
                                                <span className="text-sm font-black text-emerald-600 bg-white px-2 py-0.5 rounded shadow-sm border border-slate-100">{locationCountry || "無"}</span>
                                            )}
                                        </div>
                                    </div>

                                    <div className="pt-2 flex gap-3">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-xl transition-colors">取消</button>
                                        <button type="submit" disabled={isSubmitting} className="flex-[2] py-3.5 bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-black rounded-xl shadow-lg hover:shadow-xl transition-all active:scale-95 disabled:opacity-50">
                                            {isSubmitting ? '資料傳送中...' : (formData._rowNumber ? '儲存修改' : '確認新增')}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
